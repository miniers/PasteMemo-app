name: "✨ 功能请求 / Feature Request"
description: "提出新功能或改进建议 / Suggest a new feature or improvement"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你期望的功能以及使用场景。
        Thanks for your suggestion! Please describe the feature and your use case.

  - type: textarea
    id: description
    attributes:
      label: 功能描述 / Feature Description
      description: 清晰描述你想要的功能 / Describe the feature you'd like
      placeholder: |
        例如：希望支持按日期范围筛选剪贴板历史
        e.g., I'd like to filter clipboard history by date range
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景 / Use Case
      description: 什么情况下你需要这个功能 / When would you need this feature?
      placeholder: |
        例如：我经常需要找到几天前复制的内容，但历史记录太多，不好翻找
        e.g., I often need to find something I copied days ago, but the history is too long to scroll through
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives
      description: 目前你是怎么解决这个问题的 / How do you currently work around this?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息 / Additional Context
      description: 截图、参考链接或其他补充 / Screenshots, reference links, or anything else
    validations:
      required: false
